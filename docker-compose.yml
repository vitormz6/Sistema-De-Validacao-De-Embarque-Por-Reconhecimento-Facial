services:
  postgres-central:
    image: pgvector/pgvector:pg16
    container_name: tcc-postgres-central
    environment:
      POSTGRES_DB: boarding_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-central-data:/var/lib/postgresql/data

  postgres-edge:
    image: postgres:16
    container_name: tcc-postgres-edge
    environment:
      POSTGRES_DB: boarding_edge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-edge-data:/var/lib/postgresql/data

  central-api:
    build:
      context: .
      dockerfile: infrastructure/docker/central-api.Dockerfile
    container_name: tcc-central-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres-central
      - vision-service

  edge-api:
    build:
      context: .
      dockerfile: infrastructure/docker/edge-api.Dockerfile
    container_name: tcc-edge-api
    environment:
      BUS_ID: bus-01
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-edge:5432/boarding_edge
      VISION_SERVICE_URL: http://vision-service:8002
      CENTRAL_API_URL: http://central-api:8000
    ports:
      - "8001:8001"
    depends_on:
      - postgres-edge
      - vision-service
      - central-api

  vision-service:
    build:
      context: .
      dockerfile: infrastructure/docker/vision-service.Dockerfile
    container_name: tcc-vision-service
    ports:
      - "8002:8002"
    volumes:
      - insightface-models:/app/.insightface

  sync-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/sync-worker.Dockerfile
    container_name: tcc-sync-worker
    environment:
      BUS_ID: bus-01
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-edge:5432/boarding_edge
      CENTRAL_API_URL: http://central-api:8000
      EDGE_SYNC_API_KEY: change-me-edge-sync-key
      SYNC_INTERVAL_SECONDS: 10
    depends_on:
      - postgres-edge
      - central-api
      - edge-api

  admin-web:
    build:
      context: .
      dockerfile: infrastructure/docker/admin-web.Dockerfile
    container_name: tcc-admin-web
    environment:
      # Browser-facing, not container-facing — see apps/admin-web/.env.example
      # for why this can't be the compose service name `central-api`.
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - central-api

  operator-web:
    build:
      context: .
      dockerfile: infrastructure/docker/operator-web.Dockerfile
    container_name: tcc-operator-web
    environment:
      # Browser-facing, not container-facing — see apps/operator-web/.env.example
      # for why this can't be the compose service name `edge-api`.
      VITE_EDGE_API_BASE_URL: http://localhost:8001
    ports:
      - "5174:5174"
    depends_on:
      - edge-api

  # ─── Observabilidade ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: tcc-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - central-api
      - edge-api
      - vision-service

  grafana:
    image: grafana/grafana:11.1.0
    container_name: tcc-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-central-data:
  postgres-edge-data:
  insightface-models:
  prometheus-data:
  grafana-data: